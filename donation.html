    <link rel="stylesheet" href="bootstrap/css/bootstrap.css">
    <script src="bootstrap/js/bootstrap.js"></script>
    <title>Donation</title>
</head>
<body>
    <div class="nav bg-dark p-3">
        <nav class="nav ">
          <img class="logo" src="logo.png" height="60px" width="60px" alt="" srcset="">
          <ul class="nav mt-2 ms-5">
              <li class=" "><a class="nav-link active" href="index.html">HOME</a></li>
              <li class="ms-5 "><a class="nav-link" href="about.html">ABOUT US</a></li>

              <li class="ms-5 "><a class="nav-link" href="Join us.html">JOIN US</a></li>
             <input id="msg" type="text" class="ms-5 rounded-pill text-center text-muted" name="msg" placeholder="search Here" style="height: 40px;  border: 1px solid gray; ">
            
              <li class="ms-5"><a class="btn btn-danger ms-3 rounded-pill" href="index.html">lOG OUT</a></li>
         
          </ul>
        </nav>
    
        </div>
        <div class="container theme-background-white main-body">
            <div class="col-md-12">
              <div class="row donate-bar">  
                <div class="col-md-4 theme-blue">
                  GIVE WHERE NEEDED MOST
                </div>
                <div class="col-md-8">
                  <ul class="nav navbar-nav navbar-left donate-buttons" id="donate-buttons">
                    <li><a href="#">
                      <button class="btn-blue active" data-dollars='25' data-impact="Covers housing or counseling services for one person">
                        $25
                      </button>
                    </a></li>
                    <li><a href="#">
                      <button class="btn-blue" data-dollars='50' data-impact="Covers housing or counseling services for two people">
                        $50
                      </button>
                    </a></li>
                    <li><a href="#">
                      <button class="btn-blue" data-dollars='100' data-impact="Covers housing or counseling services for four people">
                        $100
                      </button>
                    </a></li>
                    <li><a href="#">
                      <button class="btn-blue" data-dollars='500' data-impact="Covers housing or counseling services for twenty people">
                        $500
                      </button>
                    </a></li>
                    <li id="other"><a href="#">
                      <button class="btn-blue-other" data-dollars='other' data-impact="Thank you!">
                        OTHER
                      </button>
                    </a></li>
                    <li id="other-input">
                      <span>$</span>
                     <input data-impact="That’s great. Thank you!">
                    </li>
                    <li><a href="#">
                      <button class="btn-green" data-toggle="modal" data-target="#myModal">
                        DONATE
                      </button>
                    </a></li>
                    <li style="display: none;"><a href="#">
                      LEARN MORE<i class="fa fa-chevron-right margin-left"></i>
                    </a></li>
                  </ul>
                  <p class="impact">
                    Covers housing or counseling services for one person
                  </p>
                  <!-- Modal -->
                  <div class="modal fade" id="myModal" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
                    <div class="modal-dialog">
                      <div class="modal-content">
                        <div class="modal-header well text-center theme-background-blue">
                          <button type="button" class="close" data-dismiss="modal"><span aria-hidden="true">&times;</span><span class="sr-only">Close</span></button>
                          <h2>You’re Donating:</h2>
                          <h1 style="font-size: 5.5em; margin-top: 0;">$<span id="price"></span></h1>
                          <em>Thank you!</em>
                        </div>
                        <div class="modal-body">
                          <div class="row">  
                            <section class="col-md-12">
                              <form>
                                <fieldset class="col-md-6">
                                  <legend>
                                    Your personal info
                                  </legend>
                                  <label>Your Name</label>
                                  <input type="string" class="form-control">
                                  <label>Your email</label>
                                  <input type="email" class="form-control">
                                  <label>Address</label>
                                  <input type="email" class="form-control">
                                  <label>City, State, Zip Code</label>
                                  <input type="email" class="form-control">
                                </fieldset>
                                <fieldset class="col-md-6">
                                  <legend>
                                    Credit Card Information
                                  </legend>
                                  <label for="card-number">Credit Card Number</label>
                                  <input placeholder="1234 5678 9012 3456" pattern="[0-9]*" type="text" class="form-control card-number" id="card-number">
                                  <label for="card-number">Expiration Date</label>
                                  <input placeholder="MM/YY" pattern="[0-9]*" type="text" class="form-control card-expiration" id="card-expiration">
                                  <label for="card-number">CVV Number</label>
                                  <input placeholder="CVV" pattern="[0-9]*" type="text" class="form-control card-cvv" id="card-cvv">
                                  <label for="card-number">Billing Zip Code</label>
                                  <input placeholder="ZIP" pattern="[0-9]*" type="text" class="form-control card-zip" id="card-zip">
                                </fieldset>
                              </form>
                            </section>
                          </div>
                        </div>
                        <div class="modal-footer">
                          <button type="button" class="btn btn-default" data-dismiss="modal">BACK</button>
                          <button type="button" class="btn-green">CONTINUE</button>
                        </div>
                      </div><!-- /.modal-content -->
                    </div><!-- /.modal-dialog -->
                  </div><!-- /.modal -->
                </div>
              </div><!--/.donate-bar-->
            </div><!-- /.col-md-12 -->
            <style>
                      .theme-blue {
        color: #427bb8;
      }
      .theme-orange {
        color: #cc851c;
      }
      .theme-green {
       color: #8ab042;
      }
      .theme-grey {
        color: #666666;
      }
      .theme-white {
        color: #fff;
      }
      .theme-background-blue {
        background-color: #427bb8;
        color: #fff;
      }
      .theme-background-orange {
        background-color: #cc851c;
        color: #fff;
      }
      .theme-background-green {
        background-color: #8ab042;
        color: #fff;
      }
      .theme-background-grey {
        background-color: #666666;
        color: #fff;
      }
      .theme-background-white {
        background-color: #fff;
        color: #4c4c4c;
      }
      .donate-bar {
        padding: 32px 23px 28px;
      }
      .donate-bar > div:first-child {
        font-family: 'Roboto Condensed', sans-serif;
        font-weight: bold;
        border-right: 1px dotted #2a4f76;
        margin-top: 19px;
        font-size: 25px;
        padding: 0;
      }
      .donate-buttons>li>a {
        font-size: 17px;
        font-family: 'Roboto Condensed', sans-serif;
        font-weight: bold;
        position: relative;
        display: block;
        padding: 10px 3px;
        border-radius: 5px;
      }
      .btn-blue-other,
      .btn-blue {
        font-family: 'Roboto Condensed', sans-serif;
        font-weight: bold;
        background-color: #427bb8;
        color: #fff;
        border-radius: 5px;
        border: 0;
        padding: 0;
        width: 75px;
        height: 37px;
        margin-top: 8px;
      }
      .btn-green {
        font-family: 'Roboto Condensed', sans-serif;
        font-weight: bold;
        background-color: #8ab042;
        color: #fff;
        border-radius: 5px;
        border: 0;
        padding: 0;
        width: 114px;
        height: 37px;
        margin-top: 8px;
      }
      #other-input {
        display: none;
      }
      #other-input input {
        position: relative;
        font-weight: bold;
        background-color: #fff;
        color: #427bb8;
        border-radius: 5px;
        border: 0;
        border: 5px solid #427bb8;
        padding: 0 0 3px 15px;
        width: 75px;
        height: 37px;
        margin: 18px 3px 0;
      }
      input[type=number]::-webkit-inner-spin-button, 
      input[type=number]::-webkit-outer-spin-button { 
      -webkit-appearance: none; 
       margin: 0; 
      }
      #other-input span {
        font-family: inherit;
        font-weight:bold;
        color: #427bb8;
        position: absolute;
        padding: 23px 12px;
        z-index: 10;
        pointer-events: none;
      }
      .impact {
        font-size: 1.1em;
        font-weight: bold;
        clear: both;
      }
      .nav>li>a:hover, .nav>li>a:focus {
        text-decoration: none;
        background-color: transparent;
      }
      .donate-buttons .active {
        background-color: #fff;
        border: 5px solid #427bb8;
        color: #427bb8;
      }
      .donate-buttons:focus {
      outline: -webkit-focus-ring-color auto 0px;
      }
      .donate-buttons li:last-child {
        font-size: 17px;
        line-height: 37px;
        padding-left: 20px;
        padding-top: 15px;
      }

            </style>
